<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>TradeRisk Pro - Simple & Powerful</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --bg2: #131a24;
            --bg3: #1c2633;
            --border: #2a3648;
            --text: #e8edf5;
            --text-dim: #8a9bb5;
            --green: #00d4aa;
            --red: #ff6b6b;
            --gold: #f0b429;
            --blue: #4a9eff;
            --radius: 12px;
        }
        [data-theme="light"] {
            --bg: #f8f9fa;
            --bg2: #ffffff;
            --bg3: #e9ecef;
            --border: #dee2e6;
            --text: #212529;
            --text-dim: #6c757d;
            --green: #00b38a;
            --red: #e63939;
            --gold: #f4a261;
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 10px;
            transition: background 0.3s;
        }
        .app { max-width: 1280px; margin: 0 auto; }
        .header {
            background: var(--bg3);
            padding: 14px 20px;
            border-radius: var(--radius);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }
        .logo { font-size: 1.5rem; font-weight: 700; }
        .logo span { color: var(--green); }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 18px;
        }
        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
        }
        .card-title {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .form-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
        .form-group { flex: 1; min-width: 130px; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
        }
        input:focus { border-color: var(--blue); outline: none; }

        .dir-toggle { display: flex; background: var(--bg); border-radius: 8px; padding: 4px; }
        .dir-toggle button {
            flex: 1; padding: 9px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;
        }
        .active-long { background: var(--green); color: #000; }
        .active-short { background: var(--red); color: #000; }

        .guardrail {
            padding: 10px 14px;
            border-radius: 8px;
            margin: 12px 0;
            font-weight: 500;
        }
        .warning { background: #3a2a00; color: var(--gold); border: 1px solid var(--gold); }
        .block { background: #3a1a1a; color: var(--red); border: 1px solid var(--red); }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .result-item:last-child { border: none; }

        .btn-row button {
            padding: 12px 20px;
            margin-right: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: var(--blue); color: #000; }
        .btn-green { background: var(--green); color: #000; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .stat-card {
            background: var(--bg);
            padding: 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-value { font-size: 1.4rem; font-weight: 700; }

        .journal-section { margin-top: 24px; }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .filters input, .filters select {
            padding: 8px 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--bg3); position: sticky; top: 0; z-index: 1; }
        .trade-img { max-width: 60px; height: auto; border-radius: 4px; cursor: pointer; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg3);
            color: var(--text);
            padding: 14px 28px;
            border-radius: 9999px;
            border: 1px solid var(--border);
            z-index: 9999;
            opacity: 0;
            transition: 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body data-theme="dark">

<div class="app">
    <header class="header">
        <div class="logo">Trade<span>Risk</span> Pro</div>
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
            <span id="themeToggle" style="cursor:pointer;font-size:1.5rem;">🌙</span>
            <span>Balance: <strong id="displayBalance">$10,000</strong></span>
        </div>
    </header>

    <div class="main-grid">
        <!-- INPUT CARD -->
        <div class="card">
            <div class="card-title">⚙️ New Trade Setup</div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Direction</label>
                    <div class="dir-toggle" id="dirToggle">
                        <button class="active-long" data-dir="long">LONG 📈</button>
                        <button data-dir="short">SHORT 📉</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Pair</label>
                    <select id="pairInput">
                        <option value="EURUSD">EURUSD</option>
                        <option value="USDJPY">USDJPY</option>
                        <option value="GBPJPY">GBPJPY</option>
                        <option value="AUDUSD">AUDUSD</option>
                        <option value="EURJPY">EURJPY</option>
                        <option value="GBPUSD">GBPUSD</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Balance ($)</label>
                    <input type="number" id="balanceInput" value="10000" step="100">
                </div>
                <div class="form-group">
                    <label>Risk %</label>
                    <input type="number" id="riskPctInput" value="1" step="0.1" min="0.1">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Entry Price</label>
                    <input type="number" id="entryInput" value="1.0850" step="0.00001">
                </div>
                <div class="form-group">
                    <label>Stop Loss</label>
                    <input type="number" id="slInput" value="1.0800" step="0.00001">
                </div>
                <div class="form-group">
                    <label>Take Profit</label>
                    <input type="number" id="tpInput" value="1.0950" step="0.00001">
                </div>
            </div>

            <div id="guardrailContainer"></div>

            <div class="btn-row">
                <button class="btn-primary" id="addTradeBtn">📝 Add Trade</button>
                <button id="resetBtn">↺ Reset Form</button>
            </div>
        </div>

        <!-- RESULT CARD -->
        <div class="card">
            <div class="card-title">📊 Live Calculation</div>
            <div id="results">
                <div class="result-item"><span>Pip Distance (SL)</span><span id="pipDistance">50.0</span></div>
                <div class="result-item"><span>Lot Size</span><span id="lotSize" style="color:var(--gold)">0.20</span></div>
                <div class="result-item"><span>Risk Amount</span><span id="riskAmount" style="color:var(--red)">$100</span></div>
                <div class="result-item"><span>R:R</span><span id="rrRatio" style="color:var(--green)">1:2.00</span></div>
            </div>
        </div>
    </div>

    <!-- PERFORMANCE STATS -->
    <div class="stats-grid card" id="statsGrid"></div>

    <!-- CHART -->
    <div class="card" style="margin-top:20px;">
        <div class="card-title">📈 Monthly P&amp;L</div>
        <canvas id="plChart" height="110"></canvas>
    </div>

    <!-- JOURNAL -->
    <div class="journal-section card">
        <div class="card-title">📓 Trading Journal <span id="journalCount">(0 trades)</span></div>
        
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search pair or notes..." style="flex:1; min-width:200px;">
            <select id="filterPair" style="min-width:140px;">
                <option value="">All Pairs</option>
            </select>
        </div>

        <div style="overflow-x:auto; max-height: 600px;">
            <table id="journalTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Pair</th>
                        <th>Dir</th>
                        <th>Entry</th>
                        <th>SL Pips</th>
                        <th>TP</th>
                        <th>Exit</th>
                        <th>Risk $</th>
                        <th>P&amp;L $</th>
                        <th>R:R</th>
                        <th>Planned</th>
                        <th>Followed</th>
                        <th>Notes</th>
                        <th>Image</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="journalBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const PIP_CONFIG = {
        'EURUSD': { pipSize: 0.0001, pipValue: 10 },
        'GBPUSD': { pipSize: 0.0001, pipValue: 10 },
        'AUDUSD': { pipSize: 0.0001, pipValue: 10 },
        'USDJPY': { pipSize: 0.01, pipValue: 6.15 },
        'GBPJPY': { pipSize: 0.01, pipValue: 6.15 },
        'EURJPY': { pipSize: 0.01, pipValue: 6.15 }
    };

    let trades = [];
    let direction = 'long';
    let plChartInstance = null;

    function loadData() {
        const saved = localStorage.getItem('tradeJournalPro');
        if (saved) trades = JSON.parse(saved);
        renderJournal();
        updateStats();
        renderChart();
        populateFilter();
    }

    function saveData() {
        localStorage.setItem('tradeJournalPro', JSON.stringify(trades));
    }

    function getPipDistance(a, b, pair) {
        const config = PIP_CONFIG[pair] || { pipSize: 0.0001 };
        return Math.abs(a - b) / config.pipSize;
    }

    function compute() {
        const balance = parseFloat(document.getElementById('balanceInput').value) || 10000;
        const riskPct = parseFloat(document.getElementById('riskPctInput').value) || 1;
        const entry = parseFloat(document.getElementById('entryInput').value) || 0;
        const sl = parseFloat(document.getElementById('slInput').value) || 0;
        const tp = parseFloat(document.getElementById('tpInput').value) || 0;
        const pair = document.getElementById('pairInput').value;

        const riskAmount = balance * (riskPct / 100);
        const pipDist = getPipDistance(entry, sl, pair);
        const pipValue = PIP_CONFIG[pair]?.pipValue || 10;
        const lotSize = pipDist > 0 ? riskAmount / (pipDist * pipValue) : 0;
        const rewardPips = getPipDistance(entry, tp, pair);
        const rr = pipDist > 0 ? rewardPips / pipDist : 0;

        let guardHTML = '';
        if (riskPct > 2) guardHTML += `<div class="guardrail warning">⚠️ Risk % exceeds 2%</div>`;
        if (rr < 1.5 && rr > 0) guardHTML += `<div class="guardrail block">🚫 R:R below 1:1.5</div>`;
        document.getElementById('guardrailContainer').innerHTML = guardHTML;

        document.getElementById('pipDistance').textContent = pipDist.toFixed(1);
        document.getElementById('lotSize').textContent = lotSize.toFixed(2);
        document.getElementById('riskAmount').textContent = '$' + riskAmount.toFixed(0);
        document.getElementById('rrRatio').textContent = rr > 0 ? '1:' + rr.toFixed(2) : '—';
        document.getElementById('displayBalance').textContent = '$' + balance.toFixed(0);

        return { balance, riskPct, entry, sl, tp, pair, pipDist, lotSize, riskAmount, rr, direction };
    }

    function setDirection(dir) {
        direction = dir;
        document.querySelectorAll('#dirToggle button').forEach(b => {
            b.classList.toggle('active-long', b.dataset.dir === 'long' && dir === 'long');
            b.classList.toggle('active-short', b.dataset.dir === 'short' && dir === 'short');
        });
        compute();
    }

    function addTrade() {
        const data = compute();
        if (data.rr < 1.5 && !confirm('R:R is below 1.5. Add anyway?')) return;

        const prePlanned = confirm('Was this setup pre-planned?') ? 'Yes' : 'No';
        const followed = confirm('Did you follow the plan?') ? 'Yes' : 'No';
        const exitStr = prompt('Exit price (leave empty if open):');
        let exit = exitStr ? parseFloat(exitStr) : null;
        let pl = 0;
        let realizedRR = data.rr;

        if (exit) {
            const exitPips = data.direction === 'long' 
                ? getPipDistance(data.entry, exit, data.pair)
                : getPipDistance(exit, data.entry, data.pair);
            realizedRR = data.pipDist > 0 ? exitPips / data.pipDist : 0;
            pl = data.lotSize * exitPips * (PIP_CONFIG[data.pair]?.pipValue || 10);
        }

        const image = prompt('Trade screenshot URL (optional):', '');

        const trade = {
            id: Date.now(),
            date: new Date().toISOString(),
            pair: data.pair,
            direction: data.direction,
            entry: data.entry,
            sl: data.sl,
            tp: data.tp,
            exit: exit,
            pipDist: data.pipDist,
            lotSize: data.lotSize,
            riskAmount: data.riskAmount,
            pl: pl,
            rr: realizedRR,
            prePlanned: prePlanned,
            followed: followed,
            image: image || null,
            notes: prompt('Notes (optional):', '') || ''
        };

        trades.unshift(trade);
        saveData();
        renderJournal();
        updateStats();
        renderChart();
        populateFilter();
        showToast('✅ Trade added successfully');
    }

    function deleteTrade(id) {
        if (confirm('Delete this trade?')) {
            trades = trades.filter(t => t.id !== id);
            saveData();
            renderJournal();
            updateStats();
            renderChart();
            populateFilter();
        }
    }

    function renderJournal() {
        const tbody = document.getElementById('journalBody');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const filterPair = document.getElementById('filterPair').value;

        let filtered = trades.filter(t => {
            const matchSearch = !search || 
                t.pair.toLowerCase().includes(search) || 
                (t.notes && t.notes.toLowerCase().includes(search));
            const matchPair = !filterPair || t.pair === filterPair;
            return matchSearch && matchPair;
        });

        document.getElementById('journalCount').textContent = `(${filtered.length} trades)`;

        let html = '';
        filtered.forEach(t => {
            const plClass = t.pl >= 0 ? 'color:#0f0' : 'color:#f66';
            const imgHtml = t.image ? `<img src="\( {t.image}" class="trade-img" onclick="window.open(' \){t.image}')">` : '—';
            
            html += `
                <tr>
                    <td>${new Date(t.date).toLocaleDateString()}</td>
                    <td>${t.pair}</td>
                    <td>${t.direction === 'long' ? '📈' : '📉'}</td>
                    <td>${t.entry}</td>
                    <td>${t.pipDist.toFixed(1)}</td>
                    <td>${t.tp}</td>
                    <td>${t.exit ? t.exit : '—'}</td>
                    <td>\[ {t.riskAmount.toFixed(0)}</td>
                    <td style="${plClass}"> \]{t.pl.toFixed(2)}</td>
                    <td>${t.rr.toFixed(2)}</td>
                    <td>${t.prePlanned}</td>
                    <td>${t.followed}</td>
                    <td>${t.notes}</td>
                    <td>${imgHtml}</td>
                    <td><button onclick="deleteTrade(${t.id})" style="background:none;border:none;color:var(--red);cursor:pointer;">×</button></td>
                </tr>`;
        });

        tbody.innerHTML = html || `<tr><td colspan="15" style="text-align:center;padding:40px;color:var(--text-dim);">No trades found</td></tr>`;
    }

    function updateStats() {
        const container = document.getElementById('statsGrid');
        if (trades.length === 0) {
            container.innerHTML = '<div class="stat-card"><div class="stat-value">0</div><div>No trades</div></div>';
            return;
        }

        let totalPL = 0, wins = 0, losses = 0, totalRR = 0, rrCount = 0;
        trades.forEach(t => {
            totalPL += t.pl || 0;
            if (t.pl > 0) wins++;
            else if (t.pl < 0) losses++;
            if (t.rr) {
                totalRR += t.rr;
                rrCount++;
            }
        });

        const winRate = trades.length > 0 ? (wins / trades.length * 100).toFixed(1) : 0;
        const avgRR = rrCount > 0 ? (totalRR / rrCount).toFixed(2) : 0;
        const expectancy = (winRate/100 * avgRR) - ((100-winRate)/100);

        container.innerHTML = `
            <div class="stat-card">
                <div class="stat-value" style="color:var(--green)">${winRate}%</div>
                <div>Win Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${avgRR}</div>
                <div>Avg R:R</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="${totalPL >= 0 ? 'color:var(--green)' : 'color:var(--red)'}">
                    $${totalPL.toFixed(0)}
                </div>
                <div>Total P&amp;L</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${expectancy.toFixed(2)}</div>
                <div>Expectancy</div>
            </div>
        `;
    }

    function renderChart() {
        const ctx = document.getElementById('plChart');
        if (plChartInstance) plChartInstance.destroy();

        // Simple monthly grouping
        const monthlyPL = {};
        trades.forEach(t => {
            const month = new Date(t.date).toISOString().slice(0,7);
            monthlyPL[month] = (monthlyPL[month] || 0) + (t.pl || 0);
        });

        const labels = Object.keys(monthlyPL).sort();
        const data = labels.map(m => monthlyPL[m]);

        plChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Monthly P&L',
                    data: data,
                    borderColor: '#00d4aa',
                    backgroundColor: 'rgba(0, 212, 170, 0.2)',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.1)' } },
                    x: { grid: { color: 'rgba(255,255,255,0.1)' } }
                }
            }
        });
    }

    function populateFilter() {
        const select = document.getElementById('filterPair');
        const pairs = new Set(trades.map(t => t.pair));
        select.innerHTML = '<option value="">All Pairs</option>';
        pairs.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.textContent = p;
            select.appendChild(opt);
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // Event Listeners
    document.getElementById('dirToggle').addEventListener('click', e => {
        if (e.target.dataset.dir) setDirection(e.target.dataset.dir);
    });

    document.getElementById('addTradeBtn').addEventListener('click', addTrade);
    document.getElementById('resetBtn').addEventListener('click', () => {
        if (confirm('Reset form?')) location.reload();
    });

    // Live calculation
    const inputIds = ['balanceInput', 'riskPctInput', 'entryInput', 'slInput', 'tpInput', 'pairInput'];
    inputIds.forEach(id => {
        document.getElementById(id).addEventListener('input', compute);
    });

    // Journal filters
    document.getElementById('searchInput').addEventListener('input', renderJournal);
    document.getElementById('filterPair').addEventListener('change', renderJournal);

    // Theme toggle
    document.getElementById('themeToggle').addEventListener('click', () => {
        const current = document.body.getAttribute('data-theme');
        const newTheme = current === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', newTheme);
        document.getElementById('themeToggle').textContent = newTheme === 'light' ? '☀️' : '🌙';
    });

    // Keyboard shortcut
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            addTrade();
        }
    });

    // Initialize
    loadData();
    setDirection('long');
    compute();
    console.log('%cTradeRisk Pro initialized successfully', 'color:#00d4aa;font-weight:bold');
</script>
</body>
</html>
